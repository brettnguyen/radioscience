## config/default.yaml

project:
  name: "cosmic2_bp_geolocation_reproduction"
  description: >
    Reproduction configuration for geolocation of ionospheric irregularities
    using back propagation of COSMIC-2 high-rate GNSS radio occultation signals.

training:
  applicable: false
  note: >
    The paper does not describe a machine learning model or any training
    procedure. Therefore, no learning rate, batch size, epochs, optimizer,
    or loss function are specified.

data:
  cosmic2:
    source: "UCAR COSMIC Data Analysis and Archive Center"
    doi: "https://doi.org/10.5065/T353-C093"
    data_type: "COSMIC-2 high-rate phase and amplitude/SNR from POD antennas"
    years:
      - 2021
      - 2023
    receiver_orbits_required: true
    pod_antennas:
      - "velocity_facing"
      - "anti_velocity_facing"
    sampling_rates_hz:
      gps: 50
      glonass: 100
    amplitude_representation: "SNR scaled to 1-Hz band"
    notes:
      - "GPS signals are tracked in closed-loop mode."
      - "GLONASS signals are tracked in open-loop mode and require ground processing if connected phase is not already provided."
      - "High-rate data are downlinked when onboard 10-s S4 exceeds a threshold; the exact onboard threshold is not specified in the paper."

  gnss:
    orbit_clock_source: "International GNSS Service"
    required: true

  magnetic_field:
    model: "IGRF-13"
    source_reference: "Alken et al. 2021"
    use_field_direction_only: true

  f107:
    source: "https://omniweb.gsfc.nasa.gov/form/dx1.html"
    required_for: "Solar activity comparison, Figure 22-style analysis"

paths:
  cosmic2_hr_data_dir: "data/cosmic2/hr"
  receiver_orbit_dir: "data/cosmic2/orbits"
  gnss_orbit_clock_dir: "data/gnss"
  f107_data_path: "data/f107/f107.csv"
  output_dir: "outputs"

signals:
  primary_signal: "L1"
  l1_l2_comparison:
    enabled: true
    start_date: "2021-02-19"
    end_date: "2021-03-01"
    gps_l2_allowed:
      - "L2C"
    gps_l2_excluded:
      - "L2P"
    note: >
      The abstract mentions a 2-month comparison, but the body text specifies
      February 19 to March 1, 2021. This configuration follows the body text.

processing:
  window_seconds: 10

  scintillation_indices:
    sigma_phi_threshold_rad: 0.25
    compute_sigma_phi_in_ground_processing: true
    s4_definition: "sqrt(<I^2> - <I>^2) / <I>, where I = A^2"
    phase_detrending:
      method: "unspecified_in_paper"
      default_implementation: "polynomial"
      polynomial_order: 1
      note: >
        The exact detrending method is not specified in the paper.
        This default uses a first-order polynomial detrend over each 10-s
        window and should be tested/documented during reproduction.

  tangent_point_filter:
    min_height_km: 150
    rationale: "Avoid processing through sporadic E-layer region."

  local_time_filter:
    enabled_for_monthly_maps: true
    start_hour: 18
    end_hour: 24
    reference: "geolocation_longitude"
    note: >
      The paper uses post-sunset hours 18-24 local time, but does not explicitly
      state the reference longitude. Geolocation longitude is used by default.

back_propagation:
  representation: "coordinate"
  propagation_method_default: "fft_plane_wave"
  alternative_method_available: "kirchhoff_diffraction_integral"
  note: >
    The paper describes both diffraction-integral and plane-wave approaches.
    The final operational choice is not fully explicit. This reproduction
    defaults to FFT plane-wave propagation with stationary-transmitter
    correction option 2.

  distance_grid:
    min_km: 100
    max_km: 6000
    step_km: 100

  magnetic_field_candidate_grid:
    min_km: 100
    max_km: 6000
    step_km: 100

  stationary_transmitter_correction:
    enabled: true
    default_option: 2
    options:
      option_1:
        x2_prime: "x2"
        recommended_for: "Kirchhoff diffraction integral"
      option_2:
        x2_prime: "x20"
        recommended_for: "FFT plane-wave propagation after interpolation to uniform z grid"

  wavefront_curvature_correction:
    enabled: true
    correction_path_term: "z^2 * tan(alpha)^2 / (2R)"
    note: >
      Projection into the BP plane changes the spherical wavefront curvature
      from R to R*cos(alpha)^2. The paper corrects this by adding the path
      term z^2*tan(alpha)^2/(2R).

  v_curve:
    definition: "<A^2> / <A>^2 - 1"
    smoothing:
      enabled: true
      method: "second_order_sliding_polynomial_regression"
      window_km: 1000
      polynomial_order: 2

  minimum_detection:
    require_global_local_minimum: true
    reject_endpoint_minimum: true
    min_l1_samples: 2
    min_l2_samples: 2
    sample_spacing_km: 100

  quality_control:
    q_threshold: 1.2
    cos_alpha_threshold: 0.1
    require_single_valued_geolocation: true
    discard_multivalued_geolocations: true

  geolocation:
    equation: "R_geo = R_rx + L * n_rt"
    n_rt_definition: "(R_rx - R_tx) / |R_rx - R_tx|"
    note: >
      The sign convention must be verified during implementation so that the
      geolocation lies along the receiver-transmitter line of sight. The paper
      provides this equation, but practical code should confirm whether the
      unit vector points from receiver toward transmitter for each data product.

synthetic_experiments:
  enabled: true

  wavelength:
    default_signal: "L1"
    note: "The paper does not explicitly state which wavelength was used for all synthetic figures."

  phase_screen:
    approximation: "single_thin_phase_screen"
    spectral_index_p: 1.5
    outer_scale_km: 10
    spectrum_1d: "(k0^2 + kz^2)^(-p/2)"
    k0_definition: "2*pi / outer_scale"

  observed_average_values:
    sigma_phi_rad: 1.65
    s4: 0.32
    sigma_phi_over_s4_rad: 5.25
    distance_from_phase_screen_to_receiver_km: 1900
    estimated_outer_scale_km: 9.7

  modeled_cases:
    single_phase_screen:
      enabled: true

    outer_scale_estimation:
      enabled: true
      target_sigma_phi_over_s4_rad: 5.25
      target_distance_km: 1900

    orientation_error:
      enabled: true
      delta_alpha_deg: 0.6
      formula: "DeltaL = 2 * L * tan(alpha) * DeltaAlpha"
      table_cases:
        - alpha_deg: 15
          distances_km:
            - 1000
            - 3000
            - 5000
        - alpha_deg: 45
          distances_km:
            - 1000
            - 3000
            - 5000
        - alpha_deg: 75
          distances_km:
            - 1000
            - 3000
            - 5000

    two_phase_screens_same_orientation:
      enabled: true
      separation_km: 1000
      equal_sigma_phi_case: true
      unequal_sigma_phi_case: true
      sigma_phi_ratio_stronger_to_weaker: 1.5

    two_phase_screens_different_orientation:
      enabled: true
      forward_propagation_dimension: "3D"
      back_propagation_dimension: "2D"
      alpha_cases_deg:
        - - 30
          - 60
        - - 60
          - 30

    thermal_noise:
      enabled: true
      phase_screen_distance_km: 2000
      sigma_phi_cases_rad:
        - 1.65
        - 0.25
      snr_1hz_cases_vv:
        - 200
        - 400
        - 600
      average_snr_1hz_vv: 400
      typical_snr_1hz_range_vv:
        - 200
        - 600
      assumed_sampling_rate_hz: 100
      assumed_projected_scan_velocity_km_s: 4
      modeled_spatial_interval_km: 40
      windowed_spatial_interval_km: 35
      internal_grid_step_m: 10

real_data_experiments:
  monthly_l1_maps:
    enabled: true
    years:
      - 2021
      - 2023
    signal: "L1"
    local_time_hours:
      - 18
      - 24
    bin_size_deg:
      latitude: 3
      longitude: 3
    expected_total_geolocations:
      2021: 332000
      2023: 1108000

  l1_l2_comparison:
    enabled: true
    start_date: "2021-02-19"
    end_date: "2021-03-01"
    expected_counts:
      l1_geolocations: 13000
      l2_geolocations: 11000
      common_l1_l2_cases: 8000
    zonal_difference_histogram_bin_deg: 0.5

outputs:
  save_interval_results: true
  save_diagnostics: true
  save_v_curves_for_debug_cases: true
  save_d_curves_for_debug_cases: true
  save_monthly_maps: true
  save_l1_l2_histogram: true
  save_f107_plot: true

reproducibility:
  random_seed: 42
  log_rejection_reasons: true
  log_multivalued_cases: true
  log_processing_statistics: true

app_config_mapping:
  cosmic_data_dir: "paths.cosmic2_hr_data_dir"
  receiver_orbit_dir: "paths.receiver_orbit_dir"
  gnss_orbit_dir: "paths.gnss_orbit_clock_dir"
  output_dir: "paths.output_dir"
  igrf_model: "data.magnetic_field.model"
  sigma_phi_threshold_rad: "processing.scintillation_indices.sigma_phi_threshold_rad"
  tangent_height_min_km: "processing.tangent_point_filter.min_height_km"
  bp_min_distance_km: "back_propagation.distance_grid.min_km"
  bp_max_distance_km: "back_propagation.distance_grid.max_km"
  bp_step_km: "back_propagation.distance_grid.step_km"
  mf_step_km: "back_propagation.magnetic_field_candidate_grid.step_km"
  q_threshold: "back_propagation.quality_control.q_threshold"
  cos_alpha_threshold: "back_propagation.quality_control.cos_alpha_threshold"
  smoothing_window_km: "back_propagation.v_curve.smoothing.window_km"
  smoothing_poly_order: "back_propagation.v_curve.smoothing.polynomial_order"
  map_bin_deg: "real_data_experiments.monthly_l1_maps.bin_size_deg.latitude"
  random_seed: "reproducibility.random_seed"

validation_expectations:
  paper_reproduction_defaults:
    processing_window_seconds: 10
    sigma_phi_threshold_rad: 0.25
    tangent_point_min_height_km: 150
    bp_distance_grid_min_km: 100
    bp_distance_grid_max_km: 6000
    bp_distance_grid_step_km: 100
    magnetic_field_candidate_grid_min_km: 100
    magnetic_field_candidate_grid_max_km: 6000
    magnetic_field_candidate_grid_step_km: 100
    q_threshold: 1.2
    cos_alpha_threshold: 0.1
    v_smoothing_enabled: true
    v_smoothing_window_km: 1000
    v_smoothing_polynomial_order: 2
    monthly_map_latitude_bin_deg: 3
    monthly_map_longitude_bin_deg: 3
    local_time_start_hour: 18
    local_time_end_hour: 24
    magnetic_field_model: "IGRF-13"

unclear_from_paper:
  - "Exact phase detrending method before sigma_phi calculation."
  - "Exact COSMIC-2 HR data field names and preprocessing state."
  - "Whether final large-scale processing used FFT plane-wave BP or Kirchhoff integral BP."
  - "Exact SNR/amplitude normalization before back propagation."
  - "Exact local-time reference point for post-sunset filtering."
  - "Sign convention of final geolocation vector should be verified."
  - "L1/L2 comparison period differs between abstract and body text."
